<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .error-code {
      font-size: 72px;
      font-weight: 700;
      color: #0078d4;
      line-height: 1;
      margin-bottom: 12px;
    }

    .error-label {
      display: inline-block;
      background: #1e2235;
      border: 1px solid #2a2d3e;
      color: #a0a0b0;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    h1 {
      font-size: 22px;
      color: #ffffff;
      margin-bottom: 12px;
    }

    p {
      color: #a0a0b0;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    a {
      display: inline-block;
      background: #0078d4;
      color: white;
      text-decoration: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      transition: background 0.2s;
    }

    a:hover {
      background: #005fa3;
    }

    .footer {
      font-size: 12px;
      color: #555;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="error-code">404</div>
    <span class="error-label">Page Not Found</span>
    <h1>Oops — this resource doesn't exist</h1>
    <p>
      The page you're looking for may have been moved,
      deleted, or never existed. Check the URL or
      head back to the homepage.
    </p>
    <a href="index.html">← Back to Home</a>
    <div class="footer">Hosted on Azure Blob Storage · Static Website</div>
  </div>
</body>
</html>
